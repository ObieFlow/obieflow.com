<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ObieFlow — Coming Soon</title>
  <meta name="description" content="Sounds like you. Runs without you. AI social media manager for small business owners.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --coral: #E8524A;
      --navy: #1E2340;
      --cream: #FAFAF8;
      --muted: #8A8F99;
    }

    body {
      background: var(--cream);
      color: var(--navy);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .page {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }

    /* LEFT SIDE */
    .left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem 5rem 4rem 6rem;
      animation: fadeLeft 0.9s ease forwards;
      opacity: 0;
    }

    @keyframes fadeLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .logo {
      width: 180px;
      height: auto;
      margin-bottom: 3.5rem;
      display: block;
    }

    .tagline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 400;
      color: var(--navy);
      line-height: 1.25;
      margin-bottom: 1.5rem;
      letter-spacing: -0.02em;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: var(--coral);
      margin-bottom: 1.5rem;
      border-radius: 2px;
    }

    .coming-soon {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    .description {
      font-size: 1rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 2.5rem;
      max-width: 340px;
    }

    .contact {
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 300;
    }

    .contact a {
      color: var(--coral);
      text-decoration: none;
      border-bottom: 1px solid rgba(232,82,74,0.3);
      transition: border-color 0.2s ease;
    }

    .contact a:hover {
      border-color: var(--coral);
    }

    /* RIGHT SIDE */
    .right {
      background: #1E2340;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      animation: fadeRight 0.9s ease forwards;
      opacity: 0;
    }

    @keyframes fadeRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .right::before {
      content: '';
      position: absolute;
      top: -30%;
      left: -20%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(232,82,74,0.15) 0%, transparent 65%);
      pointer-events: none;
    }

    .right::after {
      content: '';
      position: absolute;
      bottom: -20%;
      right: -10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(232,82,74,0.08) 0%, transparent 65%);
      pointer-events: none;
    }

    .obie-wrap {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .obie-img {
      width: 280px;
      height: auto;
      display: block;
      margin: 0 auto 2rem;
      filter: drop-shadow(0 20px 60px rgba(232,82,74,0.2));
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .obie-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    /* FOOTER */
    footer {
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 300;
      opacity: 0.5;
      padding: 1.25rem;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 50%;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .page {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
      }

      .right {
        padding: 3rem 2rem;
        min-height: 280px;
        order: -1;
      }

      .obie-img {
        width: 160px;
      }

      .left {
        padding: 2.5rem 2rem 4rem;
      }

      .tagline {
        font-size: 1.8rem;
      }

      footer {
        position: static;
        right: auto;
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="left">
      <img src="logo.png" alt="ObieFlow" class="logo">
      <p class="tagline">Sounds like you.<br>Runs without you.</p>
      <div class="divider"></div>
      <span class="coming-soon">Coming soon</span>
      <p class="description">AI social media manager built for small business owners. Your voice. On autopilot.</p>
      <p class="contact">Questions? <a href="mailto:hello@obieflow.com">hello@obieflow.com</a></p>
    </div>
    <div class="right">
      <div class="obie-wrap">
        <img src="logo.png" alt="Obie" class="obie-img">
        <p class="obie-label">Meet Obie</p>
      </div>
    </div>
  </div>
  <footer>&copy; 2026 ObieFlow</footer>
</body>
</html>
